<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akala Jamir | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #38bdf8, transparent, #818cf8);
            border-radius: 24px;
            z-index: -1;
            opacity: 0.3;
        }

        h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 0.5rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tag { font-size: 0.9rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem; display: block; font-weight: bold; }

        .details { text-align: left; margin: 2rem 0; font-size: 1rem; line-height: 1.8; }
        .details p { display: flex; justify-content: space-between; margin-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .label { color: #94a3b8; }

        .links { display: flex; gap: 15px; margin-top: 2rem; }
        
        .btn { flex: 1; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 600; transition: 0.3s; font-size: 0.9rem; }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }
        .btn-outline { border: 1px solid rgba(255,255,255,0.2); color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: white; }

    </style>
</head>
<body>

    <div class="glass-card">
        <span class="tag">BCA 2nd Sem | NIELIT</span>
        <h1>Akala Jamir</h1>
        <p style="color: #94a3b8;">Full-Stack Developer | GROUP - PM</p>

        <div class="details">
            <p><span class="label">Location:</span> <span>Nagaland, India</span></p>
            <p><span class="label">Email:</span> <span>akalajamiraka7@gmail.com</span></p>
            <p><span class="label">Phone:</span> <span>+91 9402054518</span></p>
        </div>

        <div class="links">
            <a href="https://github.com/aka134" target="_blank" class="btn btn-primary">GitHub</a>
            <a href="mailto:akalajamiraka7@gmail.com" class="btn btn-outline">Contact Me</a>
        </div>
    </div>

</body>
</html>
